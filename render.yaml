services:
  - type: web
    name: mf-api
    runtime: python
    buildCommand: pip install -r api/requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0

  - type: web
    name: mf-web
    runtime: node
    rootDir: web
    buildCommand: npm install && npm run build
    startCommand: npx next start -p $PORT
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: NEXT_PUBLIC_API_URL
        sync: false
